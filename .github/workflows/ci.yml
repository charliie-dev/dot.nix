# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: "CI: Nix Flake Check"
on:
  pull_request:
  push:
    branches: [main]

# id-token: write omitted — not using FlakeHub cache
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-check:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Run flake checks
        run: nix flake check

  eval-hosts:
    needs: [flake-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
          - runner: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 5
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Evaluate ${{ matrix.system }} homeConfigurations
        run: |
          # -e omitted: the `if nix eval` loop intentionally handles non-zero exits
          set -uo pipefail
          hosts=$(nix eval --file hosts.nix --apply '
            hosts: builtins.filter
              (name: hosts.${name}.system == "${{ matrix.system }}")
              (builtins.attrNames hosts)
          ' --json) || { echo "::error::nix eval failed"; exit 1; }
          echo "Hosts: $hosts"
          count=$(jq 'length' <<< "$hosts") || { echo "::error::jq failed to parse hosts"; exit 1; }
          if [ "$count" -eq 0 ]; then
            echo "No hosts for ${{ matrix.system }}, skipping"
            exit 0
          fi
          failed=0
          while IFS= read -r host; do
            echo "::group::Evaluating $host"
            if nix eval .#homeConfigurations.\"$host\".activationPackage.drvPath --raw; then
              echo " ✅"
            else
              echo " ❌"
              failed=1
            fi
            echo "::endgroup::"
          done < <(jq -r '.[]' <<< "$hosts")
          if [ "$failed" -gt 0 ]; then
            echo "::error::One or more host evaluations failed"
          fi
          exit "$failed"
