# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: "Cron: update lockfile"
on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: 0 0 * * 0 # runs weekly on Sunday at 00:00

# id-token: write omitted — not using FlakeHub cache
permissions: {}

concurrency:
  group: flake-update
  cancel-in-progress: true

env:
  BRANCH: "main"
  COMMIT_MESSAGE: "chore(lockfile): auto update flake.lock"

jobs:
  nix-flake-update:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Update flake.lock
        run: nix flake update

      - name: Check Nix flake inputs
        uses: DeterminateSystems/flake-checker-action@v12
        with:
          ignore-missing-flake-lock: false

      - name: Validate updated flake
        run: nix build .#checks.x86_64-linux.formatting --no-link

      - name: Commit flake.lock via REST Contents API (server-signed → Verified)
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            // Check if flake.lock actually changed
            // git diff --quiet exits 0 (no changes) or 1 (changes exist)
            try {
              execSync('git diff --quiet flake.lock');
              core.info('flake.lock is unchanged, nothing to commit');
              return;
            } catch (err) {
              if (err.status !== 1) {
                throw new Error(`git diff failed unexpectedly (exit ${err.status}): ${err.stderr?.toString()}`);
              }
            }

            const owner   = context.repo.owner;
            const repo    = context.repo.repo;
            const branch  = process.env.BRANCH;
            const message = process.env.COMMIT_MESSAGE;
            const path    = 'flake.lock';

            const content = fs.readFileSync(path, { encoding: 'base64' });

            // NOTE: author/committer intentionally omitted to allow platform signing
            // Retry once on 409 Conflict (stale SHA from concurrent push)
            for (let attempt = 1; attempt <= 2; attempt++) {
              let sha;
              try {
                const { data: existing } = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                sha = existing.sha;
              } catch (err) {
                core.setFailed(`Failed to fetch ${path} from ${owner}/${repo}@${branch}: ${err.message}`);
                return;
              }

              try {
                const r = await github.rest.repos.createOrUpdateFileContents({
                  owner, repo, path, branch,
                  message, content, sha
                });
                core.info(`Committed ${path}: ${r.data.commit.sha}`);
                return;
              } catch (err) {
                if (err.status === 409 && attempt < 2) {
                  core.warning(`SHA conflict, retrying (attempt ${attempt}/2)`);
                  await new Promise(resolve => setTimeout(resolve, 1000));
                  continue;
                }
                core.setFailed(`Failed to commit ${path}: ${err.message}`);
                return;
              }
            }
